services:
  - type: web
    name: fashion-measurement
    runtime: php
    buildCommand: composer install --no-dev && php artisan config:cache
    startCommand: vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false